<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Customer Dashboard - Fresh Grocers</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar"><div class="container">
    <a href="customer-dashboard.html" class="navbar-brand">🛒 Fresh Grocers</a>
    <div class="navbar-nav">
      <a href="products.html" class="nav-link">Shop</a>
      <a href="cart.html" class="nav-link">Cart (<span id="cart-count">0</span>)</a>
      <a href="order-tracking.html" class="nav-link">Orders</a>
      <div class="notif-wrapper">
        <button id="notif-btn">🔔<span id="notif-badge"></span></button>
        <div id="notif-panel"><div class="notif-panel-header"><span>Notifications</span></div><div id="notif-list"></div></div>
      </div>
      <button id="logout-btn" class="btn-icon">🚪</button>
    </div>
  </div></nav>

  <div class="dashboard-layout container">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar">J</div>
          <div style="font-weight:700;font-size:1rem;" id="user-name-display">Customer</div>
          <div class="text-muted" style="font-size:0.82rem;" id="user-email-display"></div>
          <div class="mt-1"><span class="badge badge-csr">Customer</span></div>
        </div>
        <div class="sidebar-menu">
          <a href="customer-dashboard.html" class="sidebar-link active">🏠 Overview</a>
          <a href="products.html" class="sidebar-link">🥬 Shop</a>
          <a href="cart.html" class="sidebar-link">🛒 Cart</a>
          <a href="order-tracking.html" class="sidebar-link">📦 My Orders</a>
          <a href="rating.html" class="sidebar-link">⭐ Rate Orders</a>
        </div>
      </div>
    </aside>
    <main class="dashboard-content">
      <div class="flex justify-between items-center mb-4">
        <div>
          <h2 style="font-size:1.75rem;">Welcome, <span id="greeting-name" class="text-primary">Customer</span>!</h2>
          <p class="text-muted">ID: <span id="customer-id-display" class="info-chip" style="display:inline-flex;"></span></p>
        </div>
        <a href="products.html" class="btn btn-primary">Start Shopping →</a>
      </div>

      <div class="stats-grid mb-4">
        <div class="stat-card"><div class="stat-icon" style="background:#d1fae5;">📦</div><div><div class="stat-label">Total Orders</div><div class="stat-value" id="s-total">0</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#dbeafe;">🚚</div><div><div class="stat-label">Active</div><div class="stat-value" id="s-active">0</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#fef3c7;">✅</div><div><div class="stat-label">Delivered</div><div class="stat-value" id="s-done">0</div></div></div>
      </div>

      <div class="flex justify-between items-center mb-2">
        <h3>Recent Orders</h3>
        <a href="order-tracking.html" class="btn btn-outline btn-sm">View All</a>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>Order ID</th><th>Date</th><th>Items</th><th>Status</th><th>Total</th><th>Action</th></tr></thead>
        <tbody id="orders-tbody"></tbody></table>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    const user = checkAuth(['customer']);
    if(user) {
      document.getElementById('greeting-name').textContent = user.firstName || 'Customer';
      document.getElementById('customer-id-display').textContent = user.id;
      document.getElementById('user-email-display').textContent = user.email || '';
      document.getElementById('user-avatar').textContent = (user.firstName||'C').charAt(0).toUpperCase();

      const orders = getDB('fg_orders').filter(o => o.customerId === user.id).reverse();
      document.getElementById('s-total').textContent = orders.length;
      document.getElementById('s-active').textContent = orders.filter(o => o.status !== 'Delivered').length;
      document.getElementById('s-done').textContent = orders.filter(o => o.status === 'Delivered').length;

      const tbody = document.getElementById('orders-tbody');
      if (!orders.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted" style="padding:3rem;">No orders yet. <a href="products.html" class="text-primary">Start shopping!</a></td></tr>'; }
      else {
        tbody.innerHTML = orders.slice(0,5).map(o => `
          <tr>
            <td><strong>${o.id}</strong></td>
            <td>${new Date(o.date).toLocaleDateString()}</td>
            <td>${o.items.length} item(s)</td>
            <td><span class="badge badge-${o.status.toLowerCase()}">${o.status}</span></td>
            <td class="text-primary font-bold">Rs.${o.total.toFixed(2)}</td>
            <td><a href="order-tracking.html" class="btn btn-outline btn-sm">Track</a></td>
          </tr>`).join('');
      }
    }
  </script>
</body>
</html>
