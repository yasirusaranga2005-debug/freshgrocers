<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Select Delivery Agent - Fresh Grocers</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar"><div class="container">
    <a href="index.html" class="navbar-brand">🛒 Fresh Grocers</a>
    <div class="navbar-nav">
      <div class="notif-wrapper">
        <button id="notif-btn">🔔<span id="notif-badge"></span></button>
        <div id="notif-panel"><div class="notif-panel-header"><span>Notifications</span></div><div id="notif-list"></div></div>
      </div>
    </div>
  </div></nav>

  <div class="container py-4" style="max-width:700px;">
    <div class="text-center mb-4">
      <div style="font-size:4rem;margin-bottom:1rem;">🎉</div>
      <h2 class="text-success">Order Confirmed!</h2>
      <p class="text-muted mt-1">Order ID: <strong id="show-order-id" class="text-dark"></strong></p>
      <p class="mt-2">Please select a nearby delivery agent to handle your order.</p>
    </div>

    <div id="agent-list"></div>

    <div class="text-center mt-3">
      <button id="auto-assign-btn" class="btn btn-outline">Auto-assign Closest Agent</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const user = checkAuth(['customer','csr']);
    const orderId = sessionStorage.getItem('currentOrderId');
    const deliveryLoc = sessionStorage.getItem('deliveryLocation') || '';

    if (!orderId) { window.location.href = user.role === 'csr' ? 'csr-dashboard.html' : 'customer-dashboard.html'; }
    document.getElementById('show-order-id').textContent = orderId;

    function loadAgents() {
      const agents = getDB('fg_users').filter(u => u.role === 'agent' && u.availability === true);
      const container = document.getElementById('agent-list');
      if (!agents.length) { container.innerHTML = '<div class="card p-3 text-center text-muted">No agents currently online. System will assign when one becomes available.</div>'; return; }
      const sorted = agents.map(a => ({ ...a, dist: parseFloat(simulateDistance(a.location||'', deliveryLoc)) })).sort((a,b) => a.dist - b.dist);
      container.innerHTML = sorted.map((a, i) => `
        <div class="agent-card">
          <div class="agent-avatar">${(a.firstName||'A').charAt(0)}</div>
          <div style="flex:1;">
            <div class="font-bold">${a.firstName} ${a.lastName} ${i===0?'<span class="badge badge-online" style="margin-left:6px;font-size:0.75rem;">Closest</span>':''}</div>
            <div class="flex gap-2 mt-1" style="flex-wrap:wrap;">
              <span class="info-chip">📍 ${a.location}</span>
              <span class="info-chip">📞 ${a.phone}</span>
              <span class="info-chip">★ ${a.rating}</span>
              <span class="info-chip">~${a.dist} km</span>
            </div>
          </div>
          <button class="btn btn-primary" onclick="assignAgent('${a.id}')">Select</button>
        </div>`).join('');
    }

    window.assignAgent = function(agentId) {
      const orders = getDB('fg_orders');
      const idx = orders.findIndex(o => o.id === orderId);
      if (idx > -1) {
        orders[idx].agentId = agentId; orders[idx].status = 'Assigned';
        saveDB('fg_orders', orders);
        const agent = getDB('fg_users').find(u => u.id === agentId);
        notify('Delivery agent assigned successfully!', 'success');
        if (agent) {
          addNotification(agent.id, `📦 New Order ${orderId} has been assigned to you. Customer location: ${orders[idx].customerInfo.location}`, 'info');
          setTimeout(() => notify(`[📱 SMS → ${agent.phone}] New delivery ${orderId} assigned!`, 'info'), 1500);
          setTimeout(() => notify(`[📱 SMS → Customer] Your agent is ${agent.firstName} ${agent.lastName} (${agent.phone}). ETA ~30 mins.`, 'success'), 3000);
        }
        sessionStorage.removeItem('currentOrderId'); sessionStorage.removeItem('deliveryLocation');
        setTimeout(() => { window.location.href = user.role === 'csr' ? 'csr-dashboard.html' : 'order-tracking.html'; }, 5000);
      }
    };

    document.getElementById('auto-assign-btn').addEventListener('click', () => {
      const first = document.querySelector('.agent-card .btn.btn-primary');
      if (first) first.click();
    });

    loadAgents();
  </script>
</body>
</html>
