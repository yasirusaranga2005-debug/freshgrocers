<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login - Fresh Grocers</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">🛒 Fresh Grocers</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="card auth-card">
      <div class="card-body">
        <div class="text-center mb-4">
          <div style="font-size:3rem;margin-bottom:1rem;">🔐</div>
          <h2>Welcome Back</h2>
          <p class="text-muted mt-1">Sign in to your Fresh Grocers account</p>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input id="username" type="text" class="form-control" placeholder="Enter your username" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input id="password" type="password" class="form-control" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary w-full mt-2">Sign In</button>
        </form>

        <div class="text-center mt-3">
          <p class="text-muted">New customer? <a href="register.html" class="text-primary font-bold">Create an
              account</a></p>
        </div>

        <hr class="divider">
        <div
          style="background:var(--bg-main);padding:1.25rem;border-radius:var(--radius-md);font-size:0.88rem;border:1px solid var(--border-light);">
          <div class="font-bold mb-1">Demo Accounts</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;color:var(--text-muted);">
            <span>🛍️ Customer: <strong>john</strong></span><span>Password: <strong>123</strong></span>
            <span>🛵 Agent: <strong>agent1</strong></span><span>Password: <strong>123</strong></span>
            <span>🎧 CSR: <strong>csr1</strong></span><span>Password: <strong>123</strong></span>
            <span>⚙️ Admin: <strong>admin</strong></span><span>Password: <strong>123</strong></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const u = getCurrentUser(); if (u) redirectByRole(u.role);
    document.getElementById('login-form').addEventListener('submit', e => {
      e.preventDefault();
      login(document.getElementById('username').value, document.getElementById('password').value);
    });
  </script>
</body>

</html>
