<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Products - Fresh Grocers</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar"><div class="container">
    <a href="customer-dashboard.html" class="navbar-brand">🛒 Fresh Grocers</a>
    <div class="navbar-nav">
      <a href="customer-dashboard.html" class="nav-link">Dashboard</a>
      <div class="notif-wrapper">
        <button id="notif-btn">🔔<span id="notif-badge"></span></button>
        <div id="notif-panel"><div class="notif-panel-header"><span>Notifications</span></div><div id="notif-list"></div></div>
      </div>
      <a href="cart.html" class="btn btn-primary btn-sm">🛒 Cart (<span id="cart-count">0</span>)</a>
      <button id="logout-btn" class="btn-icon" title="Logout">🚪</button>
    </div>
  </div></nav>

  <!-- Product Detail Modal -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal-box">
      <div class="modal-header">
        <span id="modal-name">Product Details</span>
        <button class="modal-close" onclick="document.getElementById('product-modal').classList.remove('open')">✕</button>
      </div>
      <div class="modal-body">
        <img id="modal-img" src="" alt="" style="width:100%;height:240px;object-fit:cover;border-radius:var(--radius-md);margin-bottom:1.25rem;">
        <div class="flex justify-between items-center mb-2">
          <span id="modal-price" style="font-size:1.75rem;font-weight:800;color:var(--primary);"></span>
          <span id="modal-stock" class="info-chip"></span>
        </div>
        <div id="modal-category" class="badge mb-2" style="background:var(--primary-light);color:var(--primary-hover);"></div>
        <p id="modal-desc" style="color:var(--text-body);line-height:1.8;margin-top:0.75rem;"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="document.getElementById('product-modal').classList.remove('open')">Close</button>
        <button class="btn btn-primary" id="modal-add-btn">Add to Cart 🛒</button>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="flex justify-between items-center mb-4" style="flex-wrap:wrap;gap:1rem;">
      <div class="page-header" style="margin-bottom:0;">
        <h2>Fresh Products</h2>
        <p class="text-muted">Browse our premium grocery selection</p>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" class="form-control" style="width:220px;" placeholder="🔍 Search products...">
        <select id="category-filter" class="form-control" style="width:180px;"><option value="all">All Categories</option></select>
      </div>
    </div>
    <div id="product-list" class="product-grid"></div>
  </div>

  <script src="app.js"></script>
  <script>
    checkAuth(['customer','csr']);
    let currentModalProduct = null;

    function loadCategoryFilter() {
      const sel = document.getElementById('category-filter');
      getDB('fg_categories').forEach(c => { sel.innerHTML += `<option value="${c.name}">${c.name}</option>`; });
    }

    function renderProducts() {
      const products = getDB('fg_products');
      const q = document.getElementById('search-input').value.toLowerCase();
      const cat = document.getElementById('category-filter').value;
      const filtered = products.filter(p =>
        (cat === 'all' || p.category === cat) &&
        (!q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q))
      );
      const el = document.getElementById('product-list');
      if (!filtered.length) { el.innerHTML = '<div class="text-center text-muted py-4" style="grid-column:1/-1">No products found.</div>'; return; }
      el.innerHTML = filtered.map(p => `
        <div class="card product-card">
          <div class="product-img-wrap" onclick="openModal('${p.id}')">
            <img src="${p.image}" class="product-img" alt="${p.name}" onerror="this.src='https://placehold.co/400x300?text=No+Image'">
            <span class="product-cat-badge">${p.category}</span>
          </div>
          <div class="product-info">
            <div class="product-name" onclick="openModal('${p.id}')">${p.name}</div>
            <div class="product-desc">${p.description||''}</div>
            <div class="product-stock">📦 Stock: ${p.stock} units</div>
            <div class="product-footer mt-2">
              <div class="product-price">Rs. ${p.price.toFixed(2)}</div>
              <button class="btn btn-primary btn-sm" onclick="addToCart('${p.id}')" ${p.stock<=0?'disabled':''}>
                ${p.stock<=0?'Out of Stock':'Add 🛒'}
              </button>
            </div>
          </div>
        </div>`).join('');
    }

    function openModal(productId) {
      const p = getDB('fg_products').find(x => x.id === productId);
      if (!p) return;
      currentModalProduct = p;
      document.getElementById('modal-name').textContent = p.name;
      document.getElementById('modal-img').src = p.image;
      document.getElementById('modal-price').textContent = `Rs. ${p.price.toFixed(2)}`;
      document.getElementById('modal-stock').textContent = `📦 ${p.stock} in stock`;
      document.getElementById('modal-category').textContent = p.category;
      document.getElementById('modal-desc').textContent = p.description||'';
      document.getElementById('modal-add-btn').disabled = p.stock <= 0;
      document.getElementById('product-modal').classList.add('open');
    }

    document.getElementById('modal-add-btn').onclick = () => {
      if (currentModalProduct) { addToCart(currentModalProduct.id); document.getElementById('product-modal').classList.remove('open'); }
    };
    document.getElementById('search-input').addEventListener('input', renderProducts);
    document.getElementById('category-filter').addEventListener('change', renderProducts);

    loadCategoryFilter();
    renderProducts();
  </script>
</body>
</html>
